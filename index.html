  <script src="js/portfolio-loader.js"></script>
  <script>
    PortfolioLoader.init('home', function(data) {
      var h = data.home;
      var m = data.meta;

      // ── Hero ──────────────────────────────────────────────
      document.getElementById('hero_title').innerHTML =
        h.heroTitle1 + (h.heroTitle2 ? '<br>' + h.heroTitle2 : '');
      document.getElementById('hero_subtitle').innerHTML =
        (h.heroSubtitle || '').replace('\\n', '<br>');

      // ── Header social links ───────────────────────────────
      document.getElementById('header_email').href    = 'mailto:' + m.email;
      document.getElementById('header_instagram').href = m.instagram;
      document.getElementById('header_linkedin').href  = m.linkedin;
      document.getElementById('nav_blog').href         = m.blog;

      // ── Contact section ───────────────────────────────────
      document.getElementById('contact_email').href        = 'mailto:' + m.email;
      document.getElementById('contact_email').textContent = m.email;
      document.getElementById('contact_instagram').href    = m.instagram;
      document.getElementById('contact_linkedin').href     = m.linkedin;

      // ── Section cards — map anchor → element ids ──────────
      var anchorMap = {
        'about'   : { title:'about_title',   subtitle:'about_subtitle',   img:'about_img',   btn:'about_btn',   imglink:'about_imglink'   },
        'resume'  : { title:'resume_title',  subtitle:'resume_subtitle',  img:'resume_img',  btn:'resume_btn',  imglink:'resume_imglink'  },
        'reile'   : { title:'reile_title',   subtitle:'reile_subtitle',   img:'reile_img',   btn:'reile_btn',   imglink:'reile_imglink'   },
        'achieve' : { title:'achieve_title', subtitle:'achieve_subtitle', img:'achieve_img', btn:'achieve_btn', imglink:'achieve_imglink' },
        'blogs'   : { title:'blogs_title',   subtitle:'blogs_subtitle',   img:'blogs_img',   btn:'blogs_btn',   imglink:'blogs_imglink'   }
      };

      (h.sections || []).forEach(function(sec) {
        var ids = anchorMap[sec.anchor];
        if (!ids) return;

        var titleEl    = document.getElementById(ids.title);
        var subtitleEl = document.getElementById(ids.subtitle);
        var imgEl      = document.getElementById(ids.img);
        var btnEl      = document.getElementById(ids.btn);
        var imgLinkEl  = document.getElementById(ids.imglink);

        if (titleEl)    titleEl.textContent  = sec.title;
        if (subtitleEl) subtitleEl.innerHTML = sec.subtitle;
        if (imgEl)      imgEl.src            = sec.image;
        if (btnEl)      btnEl.href           = sec.link;
        if (imgLinkEl)  imgLinkEl.href       = sec.link;
      });
    });
  </script>

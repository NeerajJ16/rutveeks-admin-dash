<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta http-equiv='X-UA-Compatible' content='ie=edge'>
  <title>About Me | Rutveek's PORTFOLIO</title>
  <meta name="description" content="Rutveek's PORTFOLIO / Upcoming Aerospace Enthusiast" />
  <meta property="og:image" content="https://j0811s.github.io/kuon.space/images/ogp.png" />
  <meta property="og:title" content="About Me | Rutveek's PORTFOLIO" />
  <meta property="og:url" content="Rutveek" />
  <meta property="og:site_name" content="Rutveek's PORTFOLIO" />
  <meta property="og:description" content="Rutveek's PORTFOLIO / Upcoming Aerospace Enthusiast" />
  <meta property="og:type" content="website" />
  <link rel="shortcut icon" href="./images/favicon.ico">
  <link href="./asset/css/common.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/44f81fa005.js" crossorigin="anonymous" defer></script>
  <script src="https://www.promisejs.org/polyfills/promise-6.1.0.min.js" defer></script>
  <script crossorigin="anonymous" src="https://polyfill.io/v3/polyfill.min.js?features=default%2CArray.prototype.find%2CIntersectionObserver" defer></script>
  <script src="./asset/js/common.js" defer></script>
</head>
<body id="barba-wrapper" class="js_curtain">

  <!-- Header -->
  <header id="js_header" class="ly_header">
    <div class="ly_header_title bl_headerNav_item bl_headerNav_item__both">
      <a id="js_topBack" href="./">Rutveek <br class="is_br">Ingawale</a>
    </div>
    <nav class="bl_headerNav">
      <ul class="bl_headerNav_list">
        <li class="bl_headerNav_item">
          <a class="js_noBarba" id="header_instagram" href="#" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
        </li>
        <li class="bl_headerNav_item">
          <a class="js_noBarba" id="header_linkedin" href="#" target="_blank">
            <i class="fab fa-linkedin-in"></i>
          </a>
        </li>
        <li class="bl_headerNav_item bl_headerNav_item__both">
          <div id="js_hamburgerMenu" class="bl_headerNav_btn js_link"></div>
        </li>
      </ul>
    </nav>
    <nav class="bl_hamburgerMenu js_menuOpen">
      <ul class="bl_hamburgerMenu_list">
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./">HOME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./about.html">ABOUT ME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./resume.html">RESUME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./mywork.html">WORKS</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./achieve.html">ACHIEVEMENTS</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./#contact">CONTACT</a></li>
      </ul>
    </nav>
    <div id="js_curtain" class="bl_curtain"></div>
  </header>
  <!-- END Header -->

  <!-- Body -->
  <main id="js_about" class="ly_about barba-container" data-namespace="about">

    <!-- HERO -->
    <section id="js_hero" class="bl_about js_slide">
      <div class="bl_about_textBox">
        <h1 id="about_heroTitle" class="bl_about_title"></h1>
        <p id="about_heroSubtitle" class="bl_about_text"></p>
        <div class="el_btn_wrapper">
          <a id="about_resumeBtn" class="el_btn el_btn__color js_noBarba js_active" href="docs/resume.pdf">Resume</a>
        </div>
      </div>
      <div class="bl_about_imageBox js_active">
        <img id="about_heroImage" class="bl_about_image" src="" alt="About">
      </div>
      <p id="js_scrollDown" class="bl_about_scrollDown js_active">SCROLLDOWN</p>
      <a id="js_arrowButton" class="bl_about_arrow js_backButton" href="./#about">
        <span id="js_arrowIcon" class="bl_about_arrowIcon js_active"></span>
      </a>
    </section>

    <div class="ly_article">

      <!-- WHO I AM -->
      <section class="ly_article_content">
        <h2 class="el_title"><span class="el_title__number">01</span> <span id="about_whoTitle"></span></h2>
        <div class="bl_who">
          <div class="bl_who_profile">
            <h3 id="about_whoText" class="bl_who_title"></h3>
            <p id="about_whoBio" class="bl_who_text"></p>
            <img id="about_profileImage" class="bl_who_image" src="" alt="Profile">
          </div>
        </div>
      </section>

      <!-- PASSION — rebuilt dynamically -->
      <section class="ly_article_content">
        <h2 class="el_title"><span class="el_title__number">02</span> PASSION</h2>
        <div class="bl_passion">
          <ul id="passions_list" class="bl_passion_list">
            <!-- filled by JS -->
          </ul>
        </div>
      </section>

    </div>

    <!-- Footer -->
    <div class="bl_footer">
      <ul class="bl_footer_list">
        <li class="bl_footer_item">
          <a id="footer_email" class="bl_contact_link js_noBarba js_slideIn" href="#">loading...</a>
        </li>
        <li class="bl_footer_item">
          <a id="footer_instagram" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
          <a id="footer_twitter" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-twitter"></i></a>
          <a id="footer_linkedin" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
          <a id="footer_github" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-github"></i></a>
        </li>
      </ul>
    </div>

  </main>
  <!-- END Body -->

  <script src="js/portfolio-loader.js"></script>
  <script>
    PortfolioLoader.init('about', function(data) {
      var a = data.about;
      var m = data.meta;

      // ── Header social links ───────────────────────────────
      document.getElementById('header_instagram').href = m.instagram;
      document.getElementById('header_linkedin').href  = m.linkedin;

      // ── Hero ──────────────────────────────────────────────
      // ── Resume button ────────────────────────────────────
      var resumeBtn = document.getElementById('about_resumeBtn');
      if (resumeBtn && a.resumeLink) resumeBtn.href = a.resumeLink;

      document.getElementById('about_heroTitle').textContent    = a.heroTitle;
      document.getElementById('about_heroSubtitle').textContent = a.heroSubtitle;
      document.getElementById('about_heroImage').src            = a.heroImage;

      // ── Who I Am ──────────────────────────────────────────
      document.getElementById('about_whoTitle').textContent = a.whoTitle;
      document.getElementById('about_whoText').textContent  = a.whoText;
      document.getElementById('about_whoBio').textContent   = a.whoBio;
      document.getElementById('about_profileImage').src     = a.profileImage;

      // ── Passions — build list ─────────────────────────────
      var list = document.getElementById('passions_list');
      list.innerHTML = (a.passions || []).map(function(p) {
        return '<li class="bl_passion_item">' +
          '<div class="bl_passion_image"><img src="' + p.icon + '" alt="' + p.title + '"></div>' +
          '<h3 class="bl_passion_title">' + p.title + '</h3>' +
          '<p class="bl_passion_text">' + p.text + '</p>' +
          '</li>';
      }).join('');

      // ── Footer links ──────────────────────────────────────
      document.getElementById('footer_email').href        = 'mailto:' + m.email;
      document.getElementById('footer_email').textContent = m.email;
      document.getElementById('footer_instagram').href    = m.instagram;
      document.getElementById('footer_twitter').href      = m.twitter;
      document.getElementById('footer_linkedin').href     = m.linkedin;
      document.getElementById('footer_github').href       = m.github;
    });
  </script>

</body>
</html>

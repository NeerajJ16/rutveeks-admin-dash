  <meta property="og:url" content="Rutveek" />
  <meta property="og:site_name" content="Rutveek's PORTFOLIO" />
  <meta property="og:description" content="Rutveek's PORTFOLIO / Upcoming Aerospace Enthusiast" />
  <meta property="og:type" content="website" />
  <link rel="shortcut icon" href="./images/favicon.ico">
  <link href="./asset/css/common.css" rel="stylesheet">

  <script src="https://www.promisejs.org/polyfills/promise-6.1.0.min.js" defer></script>
  <script crossorigin="anonymous" src="https://polyfill.io/v3/polyfill.min.js?features=default%2CArray.prototype.find%2CIntersectionObserver" defer></script>
  <script src="./asset/js/common.js" defer></script>
</head>
<body class="js_curtain">

  <!-- Header -->
  <header id="js_header" class="ly_header">
    <div class="ly_header_title bl_headerNav_item bl_headerNav_item__both">
      <a id="js_topBack" href="./">Rutveek <br class="is_br">Ingawale</a>
    </div>
    <nav class="bl_headerNav">
      <ul class="bl_headerNav_list">
        <li class="bl_headerNav_item">
          <a class="js_noBarba" id="header_instagram" href="#" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
        </li>
        <li class="bl_headerNav_item">
          <a class="js_noBarba" id="header_linkedin" href="#" target="_blank">
            <i class="fab fa-linkedin-in"></i>
          </a>
        </li>
        <li class="bl_headerNav_item bl_headerNav_item__both">
          <div id="js_hamburgerMenu" class="bl_headerNav_btn js_link"></div>
        </li>
      </ul>
    </nav>
    <nav class="bl_hamburgerMenu js_menuOpen">
      <ul class="bl_hamburgerMenu_list">
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./">HOME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./about.html">ABOUT ME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./resume.html">RESUME</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./mywork.html">WORKS</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./achieve.html">ACHIEVEMENTS</a></li>
        <li class="bl_hamburgerMenu_item"><a class="bl_hamburgerMenu_link js_link js_hash" href="./#contact">CONTACT</a></li>
      </ul>
    </nav>
    <div id="js_curtain" class="bl_curtain"></div>
  </header>
  <!-- END Header -->

  <!-- Body -->
  <main id="js_about" class="ly_about" data-namespace="about">

    <!-- HERO -->
    <section id="js_hero" class="bl_about js_slide">
      <div class="bl_about_textBox">
        <h1 id="resume_heroTitle" class="bl_about_title"></h1>
        <p id="resume_heroSubtitle" class="bl_about_text"></p>
      </div>
      <div class="bl_about_imageBox js_active">
        <img id="resume_heroImage" class="bl_about_image" src="" alt="Resume">
      </div>
      <p id="js_scrollDown" class="bl_about_scrollDown js_active">SCROLLDOWN</p>
      <a id="js_arrowButton" class="bl_about_arrow js_backButton" href="./#resume">
        <span id="js_arrowIcon" class="bl_about_arrowIcon js_active"></span>
      </a>
    </section>

    <div class="ly_article">

      <!-- EDUCATION -->
      <section class="ly_article_content">
        <h2 class="el_title"><span class="el_title__number">01</span>EDUCATION</h2>
        <div class="bl_who">
          <div id="education_container" class="bl_who_profile">
            <!-- filled by JS -->
          </div>
        </div>
      </section>

      <!-- WORK EXPERIENCE -->
      <section class="ly_article_content">
        <h2 class="el_title"><span class="el_title__number">02</span>WORK <br> EXPERIENCES</h2>
        <div class="bl_who">
          <div id="experience_container" class="bl_who_profile">
            <!-- filled by JS -->
          </div>
        </div>
      </section>

      <!-- SKILLS -->
      <section class="ly_article_content">
        <h2 class="el_title"><span class="el_title__number">03</span> SKILL SET</h2>
        <ul id="skills_container" class="bl_skill">
          <!-- filled by JS -->
        </ul>
      </section>

      <div class="ly_article">

        <!-- INVOLVEMENT -->
        <section class="ly_article_content">
          <h2 class="el_title"><span class="el_title__number">04</span>Involvement</h2>
          <div class="bl_who">
            <div id="involvement_container" class="bl_who_profile">
              <!-- filled by JS -->
            </div>
          </div>
        </section>

        <!-- AWARDS -->
        <section class="ly_article_content">
          <h2 class="el_title"><span class="el_title__number">05</span>Awards</h2>
          <ul id="awards_container" class="bl_skill">
            <!-- filled by JS -->
          </ul>
        </section>

        <!-- EXTRACURRICULAR -->
        <section class="ly_article_content">
          <h2 class="el_title"><span class="el_title__number">06</span>EXTRA<br>CURRICULAR</h2>
          <ul id="extra_container" class="bl_skill">
            <!-- filled by JS -->
          </ul>
        </section>

      </div>
    </div>

    <!-- Footer -->
    <div class="bl_footer">
      <ul class="bl_footer_list">
        <li class="bl_footer_item">
          <a id="footer_email" class="bl_contact_link js_noBarba js_slideIn" href="#">loading...</a>
        </li>
        <li class="bl_footer_item">
          <a id="footer_instagram" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
          <a id="footer_twitter" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-twitter"></i></a>
          <a id="footer_linkedin" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
          <a id="footer_github" class="bl_contact_link bl_contact_link__delay2 js_noBarba js_slideIn" href="#" target="_blank"><i class="fab fa-github"></i></a>
        </li>
      </ul>
    </div>

  </main>
  <!-- END Body -->

  <script src="js/portfolio-loader.js"></script>
  <script>
    PortfolioLoader.init('resume', function(data) {
      var r = data.resume;
      var m = data.meta;

      // ── Header social links ───────────────────────────────
      document.getElementById('header_instagram').href = m.instagram;
      document.getElementById('header_linkedin').href  = m.linkedin;

      // ── Hero ──────────────────────────────────────────────
      document.getElementById('resume_heroTitle').textContent    = r.heroTitle;
      document.getElementById('resume_heroSubtitle').innerHTML   = r.heroSubtitle;
      document.getElementById('resume_heroImage').src            = r.heroImage;

      // ── Education ─────────────────────────────────────────
      var eduContainer = document.getElementById('education_container');
      eduContainer.innerHTML = (r.education || []).map(function(e) {
        return '<div class="cards">' +
          '<div class="cards1">' + e.institution +
            '<div class="cards4">' + e.location + '</div>' +
          '</div>' +
          '<div class="cards2">' +
            '<div class="course-name">' + e.degree + '</div>' +
            '<div class="course-name1">Minors: ' + e.minors + '</div>' +
            '<div class="date">' + e.years + '</div>' +
          '</div>' +
          '<div class="cards3">GPA : ' + e.gpa + '</div>' +
        '</div>' +
        '<div class="space"></div>';
      }).join('');

      // ── Work Experience ───────────────────────────────────
      var expContainer = document.getElementById('experience_container');
      expContainer.innerHTML = (r.experience || []).map(function(e) {
        var bullets = (e.bullets || []).map(function(b) {
          return '<li>' + b + '</li>';
        }).join('');
        return '<div class="cards">' +
          '<div class="cards1">' + e.company + ' |<br> ' + e.role +
            '<div class="cards4">' + e.period + '</div>' +
          '</div>' +
          '<div class="cards2">' +
            '<div class="course-name2"><ul>' + bullets + '</ul></div>' +
          '</div>' +
        '</div>' +
        '<div class="space"></div>';
      }).join('');

      // ── Skills ────────────────────────────────────────────
      var skillsContainer = document.getElementById('skills_container');
      skillsContainer.innerHTML = (r.skills || []).map(function(s) {
        return '<li class="bl_skill_item bl_skill_item__order1">' +
          '<div class="bl_skill_data">' +
            '<label class="bl_skill_name">' + s + '</label>' +
            '<div class="bl_skill_progressBar js_progressBar is_100"></div>' +
          '</div>' +
        '</li>';
      }).join('');

      // ── Involvement ───────────────────────────────────────
      var invContainer = document.getElementById('involvement_container');
      invContainer.innerHTML = (r.involvement || []).map(function(i) {
        return '<h3 class="bl_who_title">' + i.org + '</h3>' +
          '<p class="who1">' + i.role + '</p>' +
          '<div class="gaps"></div>';
      }).join('');

      // ── Awards ────────────────────────────────────────────
      var awardsContainer = document.getElementById('awards_container');
      awardsContainer.innerHTML = (r.awards || []).map(function(award, idx) {
        return '<li class="bl_skill_item bl_skill_item__order1">' +
          '<div class="bl_skill_data">' +
            '<label class="bl_skill_name">' + (idx + 1) + '. ' + award + '</label>' +
          '</div>' +
        '</li>';
      }).join('');

      // ── Extracurricular ───────────────────────────────────
      var extraContainer = document.getElementById('extra_container');
      extraContainer.innerHTML = (r.extracurricular || []).map(function(item, idx) {
        return '<li class="bl_skill_item bl_skill_item__order1">' +
          '<div class="bl_skill_data">' +
            '<label class="bl_skill_name">' + (idx + 1) + '. ' + item + '</label>' +
          '</div>' +
        '</li>';
      }).join('');

      // ── Footer links ──────────────────────────────────────
      document.getElementById('footer_email').href        = 'mailto:' + m.email;
      document.getElementById('footer_email').textContent = m.email;
      document.getElementById('footer_instagram').href    = m.instagram;
      document.getElementById('footer_twitter').href      = m.twitter;
      document.getElementById('footer_linkedin').href     = m.linkedin;
      document.getElementById('footer_github').href       = m.github;
    });
  </script>

</body>
</html>

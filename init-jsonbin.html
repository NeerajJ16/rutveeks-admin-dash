async function pushData() {
  const statusEl = document.getElementById('status');
  const outputEl = document.getElementById('output');
  statusEl.className = 'status';
  statusEl.textContent = 'Pushing data...';

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY
      },
      body: JSON.stringify(FULL_DATA)
    });
    const json = await res.json();
    if (res.ok) {
      statusEl.className = 'status success';
      statusEl.textContent = '✅ Successfully pushed to JSONBin! Your portfolio pages will now load this data.';
      outputEl.textContent = JSON.stringify(json, null, 2);
    } else {
      throw new Error(JSON.stringify(json));
    }
  } catch(e) {
    statusEl.className = 'status error';
    statusEl.textContent = '❌ Error: ' + e.message;
  }
}
